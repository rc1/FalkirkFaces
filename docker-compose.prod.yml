# Production deploy — parameterised so one file serves every corpus. Each stack
# directory on the server has its own .env supplying PROJECT_NAME / APP_DOMAIN /
# APP_NAME / GEMINI_API_KEY, plus its own photos/ + volumes/. Defaults below keep
# the original Falkirk Faces deploy working unchanged.
#
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Behind the shared Traefik v2 on the external `web` network. Basic-auth gated:
#   user: cellardyke   pass: cellardyke
name: ${PROJECT_NAME:-falkirkface}
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: ${PROJECT_NAME:-falkirkface}:local
    container_name: ${PROJECT_NAME:-falkirkface}
    restart: always
    env_file: .env
    environment:
      - NODE_ENV=production
      - SOURCE_DIR=/app/photos
      - DATA_DIR=/app/volumes
      - APP_NAME=${APP_NAME:-Falkirk Faces}
      - APP_TAGLINE=${APP_TAGLINE:-Search a crowd by expression.}
    volumes:
      - ./photos:/app/photos:ro
      - ./volumes:/app/volumes
    networks:
      - web
    labels:
      - traefik.enable=true
      - traefik.http.routers.${PROJECT_NAME:-falkirkface}.rule=Host(`${APP_DOMAIN:-falkirkfaces.electricglen.com}`)
      - traefik.http.routers.${PROJECT_NAME:-falkirkface}.entrypoints=websecure
      - traefik.http.routers.${PROJECT_NAME:-falkirkface}.tls=true
      - traefik.http.routers.${PROJECT_NAME:-falkirkface}.tls.certresolver=lets-encrypt
      - traefik.http.routers.${PROJECT_NAME:-falkirkface}.middlewares=${PROJECT_NAME:-falkirkface}-auth
      - traefik.http.middlewares.${PROJECT_NAME:-falkirkface}-auth.basicauth.users=cellardyke:$$2y$$05$$LsKzOAqQFKnpTMjB08.H7.ZKilT0DGjP40.3SvxhIwhJAr.qKQiAi
      - traefik.http.services.${PROJECT_NAME:-falkirkface}.loadbalancer.server.port=8080

networks:
  web:
    external: true
